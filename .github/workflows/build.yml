name: build

on:
  workflow_call:
    inputs:
      runner:
        default: ubuntu-latest
        required: false
        type: string
      rust:
        default: stable
        required: false
        type: string
  workflow_dispatch:
    inputs:
      runner:
        default: ubuntu-latest
        required: false
        type: choice
        options:
          - ubuntu-latest
          - macos-latest
      rust:
        default: stable
        required: false
        type: choice
        options:
          - stable
          - nightly

permissions: {}

jobs:
  build:
    runs-on: ${{ inputs.runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ inputs.rust }}
          components: clippy, rustfmt
      - uses: davidlattimore/wild-action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version-file: .tool-versions
      - uses: taiki-e/install-action@43aecc8d72668fbcfe75c31400bc4f890f1c5853 # v2.83.2
        with:
          tool: nextest, zizmor
      - name: Codegen
        run: make -j $(nproc) codegen
      - name: Check
        run: make check
      - name: Build
        run: make build
      - name: Build (release)
        run: make build OPTIONS='-r'
      - name: Run tests
        run: make test
      - name: Run tc39/test262
        run: |
          make test262 ARGS=''
          echo 'panics:'
          jq -r '.results[] | select(.status == "panic") | "  " + .file' test262.json
