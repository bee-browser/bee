# See https://bencher.dev/docs/how-to/github-actions/#base-branch
name: bench

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bench:
    # Skip if this workflow is triggered by dependabot.
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: davidlattimore/wild-action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        with:
          deno-version-file: .tool-versions
      - name: Codegen
        run: make -j $(nproc) codegen
      - uses: bencherdev/bencher@5f9d4cf890255c35e0354af1ed325108a6a0babd # v0.6.8
      - name: Benchmark tests (push)
        run: >-
          bencher run
          --project=bee-browser
          --token="$TOKEN"
          --branch="$REF_NAME"
          --testbed=ubuntu-latest
          --threshold-measure=latency
          --threshold-test=t_test
          --threshold-max-sample-size=64
          --threshold-upper-boundary=0.99
          --thresholds-reset
          --adapter=rust_criterion
          make bench
        env:
          TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
