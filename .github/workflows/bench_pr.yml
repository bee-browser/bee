# See https://bencher.dev/docs/how-to/github-actions/#pull-requests-from-forks
name: bench (PR)

on:
  pull_request:
    branches:
      - main
      - release
    types:
      - opened
      - reopened
      - edited
      - synchronize
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bench:
    # Skip if this workflow is triggered by dependabot.
    if: ${{ github.actor != 'dependabot[bot]' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: davidlattimore/wild-action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .tool-versions
      - name: Codegen
        run: make -j $(nproc) codegen
      - uses: bencherdev/bencher@5f9d4cf890255c35e0354af1ed325108a6a0babd # v0.6.8
      - name: Benchmark tests
        run: >-
          make bench >benchmark_results.txt
      - name: Upload Benchmark Results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark_results.txt
          path: ./benchmark_results.txt
          retention-days: 1
      - name: Upload GitHub Pull Request Event
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: event.json
          path: ${{ github.event_path }}
          retention-days: 1
