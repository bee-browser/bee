version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
  - package-ecosystem: cargo
    directory: /
    schedule:
      interval: daily
    cooldown:
      default-days: 7
    groups:
      # cranelift* must be updated in the same pull request
      cranelift:
        patterns:
          - 'cranelift'
          - 'cranelift-*'
