name: pull-request

on:
  pull_request:
    branches:
      - main
      - release
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

# Don't run jobs which use secrets.
jobs:
  build:
    uses: ./.github/workflows/build.yml
    permissions:
      contents: read
