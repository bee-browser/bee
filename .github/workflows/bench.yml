# See https://bencher.dev/docs/how-to/github-actions/#base-branch
name: bench

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - '**.md'

permissions: {}

jobs:
  bench:
    # Skip if this workflow is triggered by dependabot.
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: davidlattimore/wild-action@b566cb94d30560824721753b60e67a4259a548cb # 0.8.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .tool-versions
      - name: Codegen
        run: make -j $(nproc) codegen
      - uses: bencherdev/bencher@0f8f620172ccd6225d40a7590598eb7b41718af8 # v0.6.2
      - name: Benchmark tests (push)
        run: >-
          bencher run
          --project=bee-browser
          --token="$TOKEN"
          --branch="$REF_NAME"
          --testbed=ubuntu-latest
          --threshold-measure=latency
          --threshold-test=t_test
          --threshold-max-sample-size=64
          --threshold-upper-boundary=0.99
          --thresholds-reset
          --adapter=rust_criterion
          make bench
        env:
          TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
