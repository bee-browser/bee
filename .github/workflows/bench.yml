# See https://bencher.dev/docs/how-to/github-actions/#base-branch
name: bench

on:
  push:
    branches:
      - main
      - release
    paths-ignore:
      - '**.md'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  bench:
    # Skip if this workflow is triggered by dependabot.
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: read
      checks: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
          submodules: recursive
      - uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: stable
          components: rustfmt
      - uses: davidlattimore/wild-action@0bbbfa5df4380cab8e63cb8505a1ce65e1d10203 # 0.9.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version-file: .tool-versions
      - name: Codegen
        run: make -j $(nproc) codegen
      - uses: bencherdev/bencher@50fb1e138651a46d2fb704fab1adab38c181552e # v0.6.6
      - name: Benchmark tests (push)
        run: >-
          bencher run
          --project=bee-browser
          --token="$TOKEN"
          --branch="$REF_NAME"
          --testbed=ubuntu-latest
          --threshold-measure=latency
          --threshold-test=t_test
          --threshold-max-sample-size=64
          --threshold-upper-boundary=0.99
          --thresholds-reset
          --adapter=rust_criterion
          make bench
        env:
          TOKEN: ${{ secrets.BENCHER_API_TOKEN }}
          REF_NAME: ${{ github.ref_name }}
